<script>
  tailwind.config = {
    theme: {

        fontFamily: {

        },
        colors: {
          brand: {
            50: '#eff6ff',
            100: '#dbeafe',
            500: '#3b82f6',
            600: '#2563eb',
            700: '#1d4ed8',
          }
        },
        animation: {
          'fade-in': 'fadeIn 0.3s ease-out forwards',
          'slide-up': 'slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards',
        },
        keyframes: {
          fadeIn: {
            '0%': { opacity: '0' },
            '100%': { opacity: '1' },
          },
          slideUp: {
            '0%': { opacity: '0', transform: 'translateY(12px)' },
            '100%': { opacity: '1', transform: 'translateY(0)' },
          }
        },
        boxShadow: {
          'float': '0 20px 25px -5px rgba(0, 0, 0, 0.05), 0 10px 10px -5px rgba(0, 0, 0, 0.02)',

  }

<style>
  body {
    background-color: #f8fafc;
    color: #334155;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  /* Decorative Background */
  .bg-pattern {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
    background-image: radial-gradient(#cbd5e1 1px, transparent 1px);
    background-size: 32px 32px;
    opacity: 0.35;
  }
  .bg-gradient-blob {
    position: fixed; top: -20%; left: -10%; width: 60%; height: 60%; z-index: -1;
    background: radial-gradient(circle, rgba(219,234,254,0.8) 0%, rgba(248,250,252,0) 70%);
    border-radius: 50%;
    filter: blur(60px);
  }

  /* Panel Logic */
  .panel { display: none; }
  .panel.active { display: block; animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

  /* Custom Scrollbar for Light Theme */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
  ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

  /* Chat Bubbles */
  .msg-bubble {
    position: relative;
    box-shadow: 0 1px 2px rgba(0,0,0,0.05);
  }
  .msg-user .msg-bubble {
    background: linear-gradient(135deg, #3b82f6, #2563eb);
    color: #ffffff;
    border-bottom-right-radius: 4px;
  }
  .msg-bot .msg-bubble {
    background: #ffffff;
    border: 1px solid #e2e8f0;
    color: #334155;
    border-bottom-left-radius: 4px;
  }

  /* Image Checkboard bg for transparency */
  .checkerboard {
    background-image: 
      linear-gradient(45deg, #f1f5f9 25%, transparent 25%), 
      linear-gradient(-45deg, #f1f5f9 25%, transparent 25%), 
      linear-gradient(45deg, transparent 75%, #f1f5f9 75%), 
      linear-gradient(-45deg, transparent 75%, #f1f5f9 75%);
    background-size: 16px 16px;
    background-position: 0 0, 0 8px, 8px -8px, -8px 0px;
    background-color: #ffffff;
  }

  /* Details toggle arrow */
  details > summary::-webkit-details-marker { display: none; }
  
  /* Chat Empty State */
  #chat:empty::before {
    content: "在下方输入 Prompt 发起生图请求 ✨";
    margin: auto;
    color: #94a3b8; 
    font-size: 0.9rem; 
    font-weight: 500;
  }
</style>

<script>
// ---------- Status Styling Helper ----------
function setStatus(el, msg, type = '') {
  el.textContent = msg;
  // Apply light theme status colors
  el.className = `text-xs font-medium empty:hidden break-all ${type === 'err' ? 'text-rose-500' : type === 'ok' ? 'text-emerald-600' : 'text-slate-500'}`;
}

// ---------- Tabs UI Logic ----------
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    // Reset all tabs
    document.querySelectorAll('.tab-btn').forEach(b => {
      b.classList.remove('bg-white', 'text-slate-800', 'shadow-sm', 'active');
      b.classList.add('text-slate-500');

// ---------- Base64 decode logic ----------
function normalizeToDataUrl(raw) {
  let s = (raw || '').trim();
  if (!s) throw new Error('输入内容不能为空');
  const prefixRe = /^data:[^;,]+;base64,/i;
  while (prefixRe.test(s)) s = s.replace(prefixRe, '');
  s = s.replace(/\s+/g, '');
  if (!/^[A-Za-z0-9+/=]+$/.test(s)) throw new Error('包含非法的 Base64 字符');
  let bin;
  try { bin = atob(s.slice(0, 32).padEnd(Math.ceil(s.slice(0,32).length/4)*4, '=')); }
  catch (e) { throw new Error('Base64 解码失败：' + e.message); }
  const b = [...bin].map(c => c.charCodeAt(0));
  let mime = 'image/png';
  if (b[0]===0x89 && b[1]===0x50 && b[2]===0x4e && b[3]===0x47) mime = 'image/png';
  else if (b[0]===0xff && b[1]===0xd8 && b[2]===0xff) mime = 'image/jpeg';
  else if (b[0]===0x47 && b[1]===0x49 && b[2]===0x46) mime = 'image/gif';
  else if (b[0]===0x52 && b[1]===0x49 && b[2]===0x46 && b[8]===0x57 && b[9]===0x45 && b[10]===0x42 && b[11]===0x50) mime = 'image/webp';
  return { dataUrl: 'data:' + mime + ';base64,' + s, mime, b64: s };
}

// ---------- Extract image logic ----------
// Parse user-supplied size string ("1024x1024", "1024×1536", "auto", "") → {w,h} or null
function parseRequestedSize(s) {
  if (!s) return null;
  s = String(s).trim().toLowerCase();
  if (s === 'auto' || s === '') return null;
  const m = s.match(/^(\d+)\s*[x×]\s*(\d+)$/);
  if (!m) return null;
  return { w: +m[1], h: +m[2] };
}

// Attach a "actual vs requested size" badge to a container after the img loads.
// Catches proxies that silently downscale (the openclaudecode.cn 1.57M-pixel cap pattern).
function attachSizeBadge(imgEl, container, requested) {
  if (!requested) return;
  const onReady = () => {
    const aw = imgEl.naturalWidth, ah = imgEl.naturalHeight;
    if (!aw || !ah) return;
    const tol = Math.max(8, Math.max(requested.w, requested.h) * 0.02);
    const match = Math.abs(aw - requested.w) <= tol && Math.abs(ah - requested.h) <= tol;
    const reqMP = (requested.w * requested.h / 1e6).toFixed(2);
    const actMP = (aw * ah / 1e6).toFixed(2);
    const badge = document.createElement('div');
    if (match) {
      badge.className = 'mt-1.5 text-[11px] font-mono text-emerald-600';
      badge.textContent = `✓ 实际尺寸 ${aw}×${ah}（与请求一致 · ${actMP}M 像素）`;
    } else {
      badge.className = 'mt-1.5 text-[11px] font-mono text-rose-700 bg-rose-50 border border-rose-200 rounded px-2 py-1.5 leading-snug';
      badge.innerHTML = `⚠ <strong>代理静默降级</strong>：请求 <code>${requested.w}×${requested.h}</code>（${reqMP}M 像素）→ 实际返回 <code>${aw}×${ah}</code>（${actMP}M 像素）`;
    }
    container.appendChild(badge);
  };
  if (imgEl.complete && imgEl.naturalWidth) onReady();
  else imgEl.addEventListener('load', onReady, { once: true });
}

function findImageInText(text) {
  if (typeof text !== 'string') return null;
  // <img src="data:..."> or <img src="https://..."> — some web2api proxies wrap the image in raw HTML
  const im = text.match(/<img[^>]+src=["']([^"']+)["']/i);
  if (im) {
    const u = im[1];
    if (u.startsWith('data:')) { try { return { dataUrl: normalizeToDataUrl(u).dataUrl }; } catch {} }
    else if (u.startsWith('http')) return { url: u };
  }
  const dm = text.match(/(?:data:image\/[a-z]+;base64,)+([A-Za-z0-9+/=\s]+?)(?=["'\s<)]|$)/i);
  if (dm) { try { return { dataUrl: normalizeToDataUrl(dm[0]).dataUrl }; } catch {} }
  const md = text.match(/!\[[^\]]*\]\((https?:\/\/[^)\s]+)\)/);
  if (md) return { url: md[1] };
  const bu = text.match(/https?:\/\/[^\s"'<>)]+\.(?:png|jpe?g|gif|webp)(?:\?[^\s"'<>)]*)?/i);
  if (bu) return { url: bu[0] };
  const bb = text.match(/[A-Za-z0-9+/=]{200,}/);
  if (bb) { try { return { dataUrl: normalizeToDataUrl(bb[0]).dataUrl }; } catch {} }
  return null;
}

function extractImage(resp) {
  // Responses API: output[] contains image_generation_call items with base64 in `result`
  if (resp && Array.isArray(resp.output)) {
    for (const item of resp.output) {
      if (item && item.type === 'image_generation_call' && item.result) {
        try { return { dataUrl: normalizeToDataUrl(item.result).dataUrl }; } catch {}
      }
      // Some proxies may wrap image as output_image content within a message item
      if (item && item.type === 'message' && Array.isArray(item.content)) {
        for (const part of item.content) {
          if (part && part.type === 'output_image') {
            const u = part.image_url || part.url || part.b64_json || part.image;
            if (typeof u === 'string') {
              if (u.startsWith('data:') || u.startsWith('http')) {
                try { return u.startsWith('data:') ? { dataUrl: normalizeToDataUrl(u).dataUrl } : { url: u }; } catch {}
              } else {
                try { return { dataUrl: normalizeToDataUrl(u).dataUrl }; } catch {}
              }
            }
          }
          if (part && typeof part.text === 'string') {
            const hit = findImageInText(part.text);
            if (hit) return hit;
          }
        }
      }
    }
  }
  if (resp && Array.isArray(resp.data)) {
    for (const item of resp.data) {
      if (item.url) return { url: item.url };
      if (item.b64_json) {
        try { return { dataUrl: normalizeToDataUrl(item.b64_json).dataUrl }; } catch {}
      }
    }
  }
  if (resp && Array.isArray(resp.choices)) {
    for (const c of resp.choices) {
      const msg = c.message || c.delta || {};
      // Non-standard fields some web2api proxies use to attach the generated image
      // (Cherry Studio doesn't parse these; we do, defensively)
      const sideChannels = [];
      if (Array.isArray(msg.images)) sideChannels.push(...msg.images);
      if (msg.image) sideChannels.push(msg.image);
      if (Array.isArray(msg.attachments)) sideChannels.push(...msg.attachments);
      for (const item of sideChannels) {
        if (typeof item === 'string') {
          if (item.startsWith('data:')) { try { return { dataUrl: normalizeToDataUrl(item).dataUrl }; } catch {} }
          else if (item.startsWith('http')) return { url: item };
        } else if (item && typeof item === 'object') {
          const u = item.url || item.image_url || item.b64_json || item.image || item.src;
          if (typeof u === 'string') {
            if (u.startsWith('data:')) { try { return { dataUrl: normalizeToDataUrl(u).dataUrl }; } catch {} }
            else if (u.startsWith('http')) return { url: u };
            else { try { return { dataUrl: normalizeToDataUrl(u).dataUrl }; } catch {} }
          }
        }
      }
      const content = msg.content;
      if (typeof content === 'string') {
        const hit = findImageInText(content);
        if (hit) return hit;
      } else if (Array.isArray(content)) {
        for (const part of content) {
          if (part.type === 'image_url' && part.image_url) {
            const u = typeof part.image_url === 'string' ? part.image_url : part.image_url.url;
            if (u) {
              if (u.startsWith('data:')) {
                try { return { dataUrl: normalizeToDataUrl(u).dataUrl }; } catch {}
              } else return { url: u };
            }
          }
          if (typeof part.text === 'string') {
            const hit = findImageInText(part.text);
            if (hit) return hit;
          }
        }
      }
    }
  }
  return findImageInText(JSON.stringify(resp));
}

function canvasHasStrokes(canvas) {
  if (!canvas) return false;
  const ctx = canvas.getContext('2d');
  const data = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
  for (let i = 3; i < data.length; i += 4) if (data[i] > 0) return true;
  return false;
}

// Auto-compress oversized inputs so request bodies don't blow up the proxy.
// Threshold: >1.5MB or >2048px on any edge → resize to max 2048px + JPEG q=0.85
// (PNGs with transparency stay PNG to preserve alpha)
const COMPRESS_THRESHOLD_BYTES = 1.5 * 1024 * 1024;
const MAX_EDGE = 2048;

function pngHasAlpha(file) {
  return file.type === 'image/png' || /\.png$/i.test(file.name || '');
}

async function compressIfNeeded(file) {
  if (file.size <= COMPRESS_THRESHOLD_BYTES) {
    // Still might exceed MAX_EDGE — peek dimensions
    const dims = await new Promise((res) => {
      const img = new Image();
      img.onload = () => res({ w: img.naturalWidth, h: img.naturalHeight });
      img.onerror = () => res(null);
      img.src = URL.createObjectURL(file);
    });
    if (!dims || (dims.w <= MAX_EDGE && dims.h <= MAX_EDGE)) return { file, originalSize: file.size, compressed: false };
  }
  return new Promise((resolve) => {
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = () => {
      const w = img.naturalWidth, h = img.naturalHeight;
      const scale = Math.min(1, MAX_EDGE / Math.max(w, h));
      const tw = Math.round(w * scale), th = Math.round(h * scale);
      const canvas = document.createElement('canvas');
      canvas.width = tw; canvas.height = th;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, tw, th);
      const keepPng = pngHasAlpha(file);
      const outType = keepPng ? 'image/png' : 'image/jpeg';
      const quality = keepPng ? undefined : 0.85;
      canvas.toBlob((blob) => {
        URL.revokeObjectURL(url);
        if (!blob || blob.size >= file.size) {
          // Compression didn't help (e.g. small high-quality PNG) — keep original
          resolve({ file, originalSize: file.size, compressed: false });
          return;
        }
        const ext = keepPng ? 'png' : 'jpg';
        const newName = (file.name || 'image').replace(/\.[^.]+$/, '') + '.compressed.' + ext;
        const newFile = new File([blob], newName, { type: outType });
        resolve({ file: newFile, originalSize: file.size, compressed: true });
      }, outType, quality);
    };
    img.onerror = () => { URL.revokeObjectURL(url); resolve({ file, originalSize: file.size, compressed: false }); };
    img.src = url;
  });
}

async function addFiles(fileList) {
  const candidates = Array.from(fileList).filter(f => f && f.type && f.type.startsWith('image/'));
  if (candidates.length === 0) return;
  // Show grid placeholder so user sees something while compressing
  setStatus(genStatus, `正在处理 ${candidates.length} 张图...`, '');
  const results = await Promise.all(candidates.map(compressIfNeeded));
  for (const { file, originalSize, compressed } of results) {
    images.push({
      file,
      objectUrl: URL.createObjectURL(file),
      naturalWidth: 0,
      naturalHeight: 0,
      mask: null,
      originalSize,
      compressed,
    });
  }
  setStatus(genStatus, '', '');
  renderGrid();
}

function removeImageAt(i) {

  else if (editingIdx > i) editingIdx--;
  renderGrid();
}

      const masked = document.createElement('div');

function openEditor(i) {

function setupEditorMask(i) {
  const w = editImg.clientWidth, h = editImg.clientHeight;
  if (w === 0 || h === 0) { requestAnimationFrame(() => setupEditorMask(i)); return; }
  maskCanvas.width = w;
  maskCanvas.height = h;
  maskCanvas.style.width = w + 'px';
  maskCanvas.style.height = h + 'px';
  maskCtx = maskCanvas.getContext('2d');
  maskCtx.lineCap = 'round';
  maskCtx.lineJoin = 'round';
  maskCtx.clearRect(0, 0, w, h);
  if (images[i].mask) {
    maskCtx.drawImage(images[i].mask, 0, 0, w, h);
  }
}

function persistCurrentMask() {
  if (editingIdx < 0) return;
  const img = images[editingIdx];
  if (!img || !img.naturalWidth || !maskCtx) return;
  const out = document.createElement('canvas');
  out.width = img.naturalWidth;
  out.height = img.naturalHeight;
  out.getContext('2d').drawImage(maskCanvas, 0, 0, out.width, out.height);
  img.mask = canvasHasStrokes(out) ? out : null;
}

function closeEditor() {
  persistCurrentMask();
  editingIdx = -1;
  imgEditor.classList.add('hidden');
  renderGrid();
}

function getPos(e) {
  const rect = maskCanvas.getBoundingClientRect();
  const p = e.touches ? e.touches[0] : e;
  return { x: p.clientX - rect.left, y: p.clientY - rect.top };
}
function drawStroke(x, y) {
  if (!maskCtx) return;
  maskCtx.globalCompositeOperation = currentTool === 'eraser' ? 'destination-out' : 'source-over';
  maskCtx.fillStyle = 'rgba(239, 68, 68, 0.55)';
  maskCtx.beginPath();
  maskCtx.arc(x, y, brushSize / 2, 0, Math.PI * 2);
  maskCtx.fill();
}
function drawLine(x0, y0, x1, y1) {
  if (!maskCtx) return;
  maskCtx.globalCompositeOperation = currentTool === 'eraser' ? 'destination-out' : 'source-over';
  maskCtx.strokeStyle = 'rgba(239, 68, 68, 0.55)';
  maskCtx.lineWidth = brushSize;
  maskCtx.beginPath();
  maskCtx.moveTo(x0, y0);
  maskCtx.lineTo(x1, y1);
  maskCtx.stroke();
}
function startDraw(e) {
  if (!maskCtx) return;
  e.preventDefault();
  drawing = true;
  lastPoint = getPos(e);
  drawStroke(lastPoint.x, lastPoint.y);
}
function moveDraw(e) {
  if (!drawing) return;
  e.preventDefault();
  const p = getPos(e);
  drawLine(lastPoint.x, lastPoint.y, p.x, p.y);
  drawStroke(p.x, p.y);
  lastPoint = p;
}
function endDraw() { drawing = false; lastPoint = null; }

maskCanvas.addEventListener('mousedown', startDraw);
window.addEventListener('mousemove', moveDraw);
window.addEventListener('mouseup', endDraw);
maskCanvas.addEventListener('touchstart', startDraw, { passive: false });
maskCanvas.addEventListener('touchmove', moveDraw, { passive: false });

function setTool(t) {

  });
}

function fileToDataUrl(file) {
  return new Promise((resolve, reject) => {
    const fr = new FileReader();
    fr.onload = () => resolve(fr.result);
    fr.onerror = () => reject(fr.error);
    fr.readAsDataURL(file);
  });
}
function canvasToDataUrl(canvas, type) {
  type = type || 'image/png';
  return new Promise((resolve) => {
    canvas.toBlob((blob) => {
      const fr = new FileReader();
      fr.onload = () => resolve(fr.result);
      fr.readAsDataURL(blob);
    }, type);
  });
}
async function buildMaskedComposite(img) {
  const htmlImg = await new Promise((res, rej) => {
    const x = new Image();
    x.onload = () => res(x);
    x.onerror = rej;
    x.src = img.objectUrl;
  });
  const out = document.createElement('canvas');
  out.width = img.naturalWidth || htmlImg.naturalWidth;
  out.height = img.naturalHeight || htmlImg.naturalHeight;
  const ctx = out.getContext('2d');
  ctx.drawImage(htmlImg, 0, 0, out.width, out.height);
  ctx.drawImage(img.mask, 0, 0, out.width, out.height);
  return canvasToDataUrl(out);
}

document.getElementById('gen-send').addEventListener('click', async () => {
  const baseurl = document.getElementById('cfg-baseurl').value.trim().replace(/\/+$/, '');
  const key = document.getElementById('cfg-key').value.trim();
  const model = document.getElementById('cfg-model').value.trim();
  const mode = document.getElementById('cfg-mode').value;
  const size = document.getElementById('cfg-size').value.trim();
  const n = parseInt(document.getElementById('cfg-n').value, 10) || 1;
  const promptInput = document.getElementById('gen-prompt');
  const prompt = promptInput.value.trim();

  if (!baseurl || !key || !model || !prompt) {
    setStatus(genStatus, '请填写完整的接口配置与 Prompt', 'err');
    return;
  }
  if (mode === 'edits' && images.length === 0) {
    setStatus(genStatus, '请先上传至少一张参考图片', 'err');
    return;
  }
  if (mode === 'edits' && editingIdx >= 0) persistCurrentMask();

  promptInput.value = '';
  saveCfg();

  if (mode === 'edits') {
    const wrap = document.createElement('div');
    const strip = document.createElement('div');
    strip.className = 'flex flex-wrap gap-1.5 mb-2';
    images.forEach((im) => {
      const box = document.createElement('div');
      box.className = 'relative';
      const t = document.createElement('img');
      t.src = im.objectUrl;
      t.className = 'w-16 h-16 object-cover rounded-md ring-1 ring-white/25 block';
      box.appendChild(t);
      if (canvasHasStrokes(im.mask)) {
        const dot = document.createElement('span');
        dot.className = 'absolute -top-1 -right-1 w-3 h-3 bg-rose-500 rounded-full ring-2 ring-white';
        dot.title = '已涂抹';
        box.appendChild(dot);
      }
      strip.appendChild(box);
    });
    wrap.appendChild(strip);
    const t = document.createElement('div');
    t.textContent = prompt;
    wrap.appendChild(t);
    addMsg('user', wrap);
  } else {
    addMsg('user', prompt);
  }
  
  // Loading state node
  const loader = document.createElement('div');
  loader.className = 'flex items-center gap-3 text-slate-500 font-medium text-sm py-1';
  loader.innerHTML = `
    <svg class="animate-spin w-4 h-4 text-brand-500" viewBox="0 0 24 24" fill="none"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> 
    <span class="animate-pulse">正在生成图像...</span>
  `;
  const botBubble = addMsg('bot', loader);
  
  setStatus(genStatus, '请求发送中...', '');

  // Build primary (Responses API) + fallback (legacy) endpoint pairs.
  // Some proxies haven't migrated to /v1/responses yet and return 404 —
  // we silently retry the legacy endpoint so the tool keeps working.
  const headers = {
    'Authorization': 'Bearer ' + key,
    'Content-Type': 'application/json',
    'Accept': 'application/json'
  };
  const tryEndpoint = async (ep) => {
    const bodyStr = JSON.stringify(ep.body);
    const bytes = bodyStr.length; // approx; base64 chunks dominate and are 1 byte/char
    if (bytes > 10 * 1024 * 1024) {
      throw new Error(`请求体 ${(bytes/1024/1024).toFixed(1)}MB 过大（>10MB），多数代理会拒收。请：减少参考图数量 / 改小 SIZE / 开启批处理模式。`);
    }
    if (bytes > 4 * 1024 * 1024) {
      console.warn(`[米醋] 请求体 ${(bytes/1024/1024).toFixed(2)}MB，部分 serverless 代理（Vercel Edge=4MB / nginx 默认=1MB）会拒收。如果接下来 Failed to fetch，多半是这个原因。`);
    }
    const r = await fetch(ep.url, { method: 'POST', headers, body: bodyStr });
    const text = await r.text();
    return { r, text };
  };

  // ===== Batch mode: each uploaded image → its own request, throttled to 5 concurrent =====
  const batchMode = mode === 'edits' && images.length >= 2 && document.getElementById('cfg-batch-mode').checked;
  if (batchMode) {
    const batch = images.slice(); // snapshot
    const total = batch.length;

    botBubble.innerHTML = '';
    const grid = document.createElement('div');
    grid.className = 'grid grid-cols-2 sm:grid-cols-3 gap-2 mb-3';
    botBubble.appendChild(grid);
    const meta = document.createElement('div');
    meta.className = 'text-[11px] sm:text-[12px] text-slate-500 bg-slate-50 border border-slate-100 p-2.5 rounded-md break-all';
    botBubble.appendChild(meta);

    const cells = batch.map((_, idx) => {
      const cell = document.createElement('div');
      cell.className = 'relative aspect-square rounded-lg ring-1 ring-slate-200 bg-slate-100 flex items-center justify-center overflow-hidden';
      cell.innerHTML = `<svg class="w-5 h-5 text-slate-400 animate-spin" viewBox="0 0 24 24" fill="none"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>`;
      const tag = document.createElement('span');
      tag.className = 'absolute top-1.5 left-1.5 bg-black/55 text-white text-[10px] font-mono px-1.5 py-0.5 rounded';
      tag.textContent = `${idx + 1}/${total}`;
      cell.appendChild(tag);
      grid.appendChild(cell);
      return cell;
    });

    let done = 0, failed = 0, fallbackUsedAny = false, firstResp = null;
    const updateProgress = () => {
      const msg = `生成中 ${done + failed}/${total}` + (failed ? ` · 失败 ${failed}` : '');
      setStatus(genStatus, msg, '');
      meta.textContent = `批处理：${done + failed}/${total} 完成` + (failed ? `（${failed} 失败）` : '') + (fallbackUsedAny ? ' · 已切换至 web2api 兼容接口' : '');
    };
    updateProgress();

    const buildSingleEndpoints = async (im) => {
      const dataUrl = await fileToDataUrl(im.file);
      const masked = canvasHasStrokes(im.mask);
      const header = masked
        ? 'You are given two attached images: the FIRST is the original; the SECOND is the same image with a semi-transparent red overlay marking the ONLY region you may modify. Treat the red overlay as an instruction, NOT as image content. Modify ONLY pixels inside the red region; every pixel outside must remain pixel-identical to the original. Output the full edited image, same dimensions as the input.\n\nInstruction:\n' + prompt
        : 'Edit the attached image as described. Output the full edited image, same dimensions as the input.\n\nInstruction:\n' + prompt;
      const responsesContent = [{ type: 'input_text', text: header }, { type: 'input_image', image_url: dataUrl }];
      const chatContent      = [{ type: 'text',       text: header }, { type: 'image_url', image_url: { url: dataUrl } }];
      if (masked) {
        const maskedUrl = await buildMaskedComposite(im);
        responsesContent.push({ type: 'input_image', image_url: maskedUrl });
        chatContent.push({ type: 'image_url', image_url: { url: maskedUrl } });
      }
      const tool = { type: 'image_generation' };
      if (size) tool.size = size;
      return {
        primary:  { url: baseurl + '/v1/responses',        body: { model, input: [{ role: 'user', content: responsesContent }], tools: [tool] } },
        fallback: { url: baseurl + '/v1/chat/completions', body: { model, messages: [{ role: 'user', content: chatContent }] } }
      };
    };

    const requestedBatch = parseRequestedSize(size);
    const renderHit = (idx, hit) => {
      cells[idx].innerHTML = '';
      cells[idx].className = 'relative aspect-square rounded-lg ring-1 ring-slate-200 bg-slate-100 overflow-hidden checkerboard';
      const a = document.createElement('a');
      a.href = hit.dataUrl || hit.url;
      a.target = '_blank';
      a.className = 'block w-full h-full';
      const img = document.createElement('img');
      img.src = hit.dataUrl || hit.url;
      img.alt = `${prompt} (${idx + 1}/${total})`;
      img.className = 'w-full h-full object-cover';
      a.appendChild(img);
      cells[idx].appendChild(a);
      const tag = document.createElement('span');
      tag.className = 'absolute top-1.5 left-1.5 bg-black/55 text-white text-[10px] font-mono px-1.5 py-0.5 rounded pointer-events-none';
      tag.textContent = `${idx + 1}/${total}`;
      cells[idx].appendChild(tag);
      // Size mismatch badge: tiny corner pill (won't blow up the grid)
      if (requestedBatch) {
        const onReady = () => {
          const aw = img.naturalWidth, ah = img.naturalHeight;
          if (!aw || !ah) return;
          const tol = Math.max(8, Math.max(requestedBatch.w, requestedBatch.h) * 0.02);
          const match = Math.abs(aw - requestedBatch.w) <= tol && Math.abs(ah - requestedBatch.h) <= tol;
          if (!match) {
            const pill = document.createElement('span');
            pill.className = 'absolute bottom-1.5 right-1.5 bg-rose-600 text-white text-[10px] font-mono px-1.5 py-0.5 rounded shadow';
            pill.textContent = `${aw}×${ah} ⚠`;
            pill.title = `请求 ${requestedBatch.w}×${requestedBatch.h}，代理实际返回 ${aw}×${ah}（静默降级）`;
            cells[idx].appendChild(pill);
          }
        };
        if (img.complete && img.naturalWidth) onReady();
        else img.addEventListener('load', onReady, { once: true });
      }
    };

    const renderError = (idx, errMsgText) => {
      cells[idx].innerHTML = '';
      cells[idx].className = 'relative aspect-square rounded-lg ring-1 ring-rose-300 bg-rose-50 flex flex-col items-center justify-center overflow-hidden p-2 text-center';
      const errMsg = document.createElement('div');
      errMsg.className = 'text-[10px] text-rose-700 font-medium break-all';
      errMsg.style.cssText = 'display:-webkit-box;-webkit-line-clamp:4;-webkit-box-orient:vertical;overflow:hidden;';
      errMsg.textContent = (errMsgText || 'failed').slice(0, 120);
      cells[idx].appendChild(errMsg);
      const tag = document.createElement('span');
      tag.className = 'absolute top-1.5 left-1.5 bg-rose-600 text-white text-[10px] font-mono px-1.5 py-0.5 rounded';
      tag.textContent = `${idx + 1}/${total} ✕`;
      cells[idx].appendChild(tag);
    };

    const runOne = async (im, idx) => {
      try {
        const eps = await buildSingleEndpoints(im);
        let usedFallback = false, probe;
        try { probe = await tryEndpoint(eps.primary); }
        catch (err) { usedFallback = true; probe = await tryEndpoint(eps.fallback); }
        if (!probe.r.ok && !usedFallback && [404, 405, 501].includes(probe.r.status)) {
          usedFallback = true;
          probe = await tryEndpoint(eps.fallback);
        }
        if (usedFallback) fallbackUsedAny = true;
        if (!probe.r.ok) {
          let detail = '';
          try {
            const j = JSON.parse(probe.text);
            detail = (j && j.error && j.error.message) || (j && j.message) || JSON.stringify(j).slice(0, 200);
          } catch { detail = (probe.text || '').slice(0, 200); }
          throw new Error('HTTP ' + probe.r.status + (detail ? ' ' + detail : ''));
        }
        let resp;
        try { resp = JSON.parse(probe.text); } catch { resp = probe.text; }
        if (firstResp === null) firstResp = resp;
        const hit = extractImage(resp);
        if (!hit) throw new Error('未识别到图片');
        renderHit(idx, hit);
        done++;
      } catch (e) {
        renderError(idx, e.message);
        failed++;
      } finally {
        updateProgress();
      }
    };

    // Throttle to 5 concurrent workers
    const CONCURRENCY = 5;
    let cursor = 0;
    const worker = async () => {
      while (cursor < batch.length) {
        const i = cursor++;
        await runOne(batch[i], i);
      }
    };
    await Promise.all(Array.from({ length: Math.min(CONCURRENCY, batch.length) }, worker));

    const finalMsg = (failed === 0 ? `批处理完成 ${done}/${total}` : `批处理 ${done}/${total} 成功 · ${failed} 失败`) + (fallbackUsedAny ? '（已切换至 web2api 兼容接口）' : '');
    setStatus(genStatus, finalMsg, failed === 0 ? 'ok' : 'err');
    meta.textContent = finalMsg + ` · 共发出 ${total} 个独立请求，每请求含 1 张参考图`;

    rawEl.textContent = `[批处理模式：${total} 个独立请求并发执行（最多 5 并行）。下方仅展示首个成功响应。]\n\n` + (firstResp == null ? '（无可展示响应）' : (typeof firstResp === 'string' ? firstResp : JSON.stringify(firstResp, null, 2)));
    chatEl.scrollTo({ top: chatEl.scrollHeight, behavior: 'smooth' });
    return; // skip non-batch path
  }

  // image_generation tool 不接受 n 字段；某些代理还会按 n 计费但只回 1 张
  // (扣 N 次只出 1 张图的根因)。统一改为客户端循环 N 次单图请求，
  // 每次都是 n=1，"扣几次=出几张"严格对齐。
  let primary, fallback = null;
  if (mode === 'images') {
    const tool = { type: 'image_generation' };
    if (size) tool.size = size;
    primary  = { url: baseurl + '/v1/responses',          body: { model, input: prompt, tools: [tool] } };
    fallback = { url: baseurl + '/v1/images/generations', body: { model, prompt, n: 1, size } };
  } else if (mode === 'edits') {
    const anyMasked = images.some((im) => canvasHasStrokes(im.mask));
    let header;
    if (images.length === 1 && !anyMasked) {
      header = 'Edit the attached image as described. Output the full edited image, same dimensions as the input.\n\nInstruction:\n' + prompt;
    } else if (anyMasked) {
      header = 'Attached are ' + images.length + ' reference image(s). For any image IMMEDIATELY FOLLOWED BY a duplicate with a semi-transparent red overlay, the red overlay marks the ONLY region to edit in that image — treat the red overlay as an instruction, NOT as image content. For those images: modify ONLY pixels inside the red region; every pixel outside must remain pixel-identical to the original. For images without a following red-overlay duplicate, use them as reference/context as the instruction dictates.\n\nInstruction:\n' + prompt + '\n\nOutput one image.';
    } else {
      header = 'Attached are ' + images.length + ' reference images. Treat them as visual context/inspiration for the instruction below. Output ONE image per the instruction. Do NOT collage, tile, montage, or arrange the input images side-by-side unless the instruction explicitly asks for that.\n\nInstruction:\n' + prompt;
    }

    const responsesContent = [{ type: 'input_text', text: header }];
    const chatContent      = [{ type: 'text',       text: header }];
    for (const im of images) {
      const dataUrl = await fileToDataUrl(im.file);
      responsesContent.push({ type: 'input_image', image_url: dataUrl });
      chatContent.push({ type: 'image_url', image_url: { url: dataUrl } });
      if (canvasHasStrokes(im.mask)) {
        const maskedUrl = await buildMaskedComposite(im);
        responsesContent.push({ type: 'input_image', image_url: maskedUrl });
        chatContent.push({ type: 'image_url', image_url: { url: maskedUrl } });
      }
    }

    const tool = { type: 'image_generation' };
    if (size) tool.size = size;
    primary  = { url: baseurl + '/v1/responses',        body: { model, input: [{ role: 'user', content: responsesContent }], tools: [tool] } };
    fallback = { url: baseurl + '/v1/chat/completions', body: { model, messages: [{ role: 'user', content: chatContent }] } };
  } else {
    // Pure chat — no fallback
    primary = { url: baseurl + '/v1/chat/completions', body: { model, messages: [{ role: 'user', content: prompt }] } };
  }

  let rawText = '', usedFallback = false;
  try {
    // ---- Step 1: probe with first request, decide fallback ----
    let probe;
    try {
      probe = await tryEndpoint(primary);
    } catch (primaryErr) {
      if (!fallback) throw primaryErr;
      usedFallback = true;
      probe = await tryEndpoint(fallback);
    }
    if (!probe.r.ok && fallback && !usedFallback && [404, 405, 501].includes(probe.r.status)) {
      usedFallback = true;
      probe = await tryEndpoint(fallback);
    }
    rawText = probe.text;

    // ---- Step 2: if N>1 and probe succeeded, fan out N-1 more parallel calls ----
    const chosenEndpoint = usedFallback ? fallback : primary;
    const allResps = [probe];
    const wantMore = mode !== 'chat' && n > 1 && probe.r.ok;
    if (wantMore) {
      const extra = await Promise.all(
        Array.from({ length: n - 1 }, () =>
          tryEndpoint(chosenEndpoint).catch((err) => ({
            r: { ok: false, status: 0, statusText: err.message || 'fetch failed' },
            text: ''
          }))
        )
      );
      allResps.push(...extra);
    }

    // ---- Step 3: render debug panel using the first response only ----
    let firstResp;
    try { firstResp = JSON.parse(probe.text); } catch { firstResp = probe.text; }
    const fallbackPath = mode === 'images' ? '/v1/images/generations' : '/v1/chat/completions';
    const notices = [];
    if (usedFallback) notices.push(`[接口协议自动切换：该代理未提供 Responses API (/v1/responses)，已改走 web2api 兼容接口 ${fallbackPath}；所用模型不变]`);
    if (allResps.length > 1) notices.push(`[N=${n}：客户端已并发请求 ${allResps.length} 次（每次单图），下方调试面板仅展示第 1 次响应]`);
    rawEl.textContent = (notices.length ? notices.join('\n') + '\n\n' : '') + (typeof firstResp === 'string' ? firstResp : JSON.stringify(firstResp, null, 2));

    if (!probe.r.ok) {
      // Surface the proxy's actual error message (often nested in {error:{message}})
      let detail = '';
      try {
        const j = JSON.parse(probe.text);
        detail = (j && j.error && j.error.message) || (j && j.message) || JSON.stringify(j).slice(0, 400);
      } catch { detail = (probe.text || '').slice(0, 400); }
      throw new Error('HTTP ' + probe.r.status + (probe.r.statusText ? ' ' + probe.r.statusText : '') + (detail ? '\n→ ' + detail : ''));
    }

    // ---- Step 4: extract images from each response ----
    const hits = [];
    let textFallback = '';
    for (const res of allResps) {
      if (!res.r.ok) continue;
      let resp;
      try { resp = JSON.parse(res.text); } catch { resp = res.text; }
      const hit = extractImage(resp);
      if (hit) {
        hits.push(hit);
      } else if (!textFallback) {
        if (resp && resp.choices) {
          for (const c of resp.choices) {
            const m = c.message || c.delta || {};
            if (typeof m.content === 'string') textFallback += m.content;
          }
        }
        if (!textFallback && resp && Array.isArray(resp.output)) {
          for (const item of resp.output) {
            if (item && Array.isArray(item.content)) {
              for (const part of item.content) {
                if (part && typeof part.text === 'string') textFallback += part.text;
              }
            }
          }
          if (!textFallback && typeof resp.output_text === 'string') textFallback = resp.output_text;
        }
      }
    }

    botBubble.innerHTML = ''; // clear loader

    if (hits.length) {
      const isMulti = hits.length > 1;
      const container = isMulti ? document.createElement('div') : botBubble;
      if (isMulti) container.className = 'grid grid-cols-2 gap-2 mb-3';

      const requested = parseRequestedSize(size);
      const imgsToVerify = [];
      hits.forEach((hit, idx) => {
        const wrap = document.createElement('div');
        wrap.className = isMulti ? 'relative flex flex-col gap-1' : 'mb-3';
        const img = document.createElement('img');
        img.src = hit.dataUrl || hit.url;
        img.alt = prompt + (isMulti ? ` (${idx + 1}/${hits.length})` : '');
        img.className = 'max-w-full rounded-lg shadow-sm border border-slate-100 object-contain checkerboard ' + (isMulti ? 'w-full max-h-[260px]' : 'max-h-[400px]');
        wrap.appendChild(img);
        if (isMulti) {
          const tag = document.createElement('span');
          tag.className = 'absolute top-1.5 left-1.5 bg-black/55 text-white text-[10px] font-mono px-1.5 py-0.5 rounded';
          tag.textContent = `${idx + 1}/${hits.length}`;
          wrap.appendChild(tag);
        }
        container.appendChild(wrap);
        imgsToVerify.push({ img, wrap });
      });
      if (isMulti) botBubble.appendChild(container);

      const meta = document.createElement('div');
      meta.className = 'text-[11px] sm:text-[12px] text-slate-500 bg-slate-50 border border-slate-100 p-2.5 rounded-md break-all';
      if (isMulti) {
        meta.textContent = `共 ${hits.length} 张图（客户端并发 ${allResps.length} 次单图请求；点击各图可在新窗口查看）`;
      } else {
        const hit = hits[0];
        meta.innerHTML = `<span class="font-medium text-slate-600 block sm:inline">资源链接:</span> <a href="${hit.dataUrl || hit.url}" target="_blank" class="text-brand-600 hover:underline inline-flex items-center gap-1">${hit.dataUrl ? '内嵌 Base64 数据' : hit.url}</a>`;
      }
      botBubble.appendChild(meta);
      // Verify each img: requested vs actual; flag silent downscaling
      imgsToVerify.forEach(({ img, wrap }) => attachSizeBadge(img, isMulti ? wrap : meta, requested));

      const okMsg = (isMulti ? `生成完成 ${hits.length}/${allResps.length} 张` : '生成完成') + (usedFallback ? '（已切换至 web2api 兼容接口）' : '');
      setStatus(genStatus, okMsg, 'ok');
    } else {
      botBubble.textContent = textFallback || '响应中未找到图片，请查看调试面板。';
      setStatus(genStatus, '未识别到图片内容', 'err');
    }
  } catch (e) {
    const netFail = /Failed to fetch|NetworkError|Load failed|ERR_|TypeError/i.test(e.message);
    let host = '该 API';
    try { host = new URL(baseurl).hostname; } catch {}
    // Estimate current request body size to spot "payload too large" cases
    let bodyHint = '';
    try {
      let totalBytes = 0;
      if (mode === 'edits' && images.length > 0) {
        for (const im of images) totalBytes += im.file.size;
        // Base64 inflates ~33%; plus n-fold for parallel non-batch
        const inflated = totalBytes * 1.33 * (mode === 'edits' && images.length >= 2 && document.getElementById('cfg-batch-mode').checked ? 1 : Math.max(1, n));
        if (inflated > 4 * 1024 * 1024) {
          bodyHint = `<br><strong class="text-amber-700">⚠ 你这次请求的 body 估算 ${(inflated/1024/1024).toFixed(1)}MB</strong>，常见 serverless 代理（Vercel Edge / Cloudflare Workers Free / nginx 默认）上限是 4–6MB。<br>→ 推荐：勾上「批处理模式」（每请求只 1 张图，body 缩到 1/${images.length}），或减少参考图。`;
        }
      }
    } catch {}
    const hint = netFail
      ? `<div class="mt-2 text-[12px] text-slate-500 bg-slate-50 border border-slate-200 p-2.5 rounded-md leading-relaxed"><strong class="text-slate-700">这是浏览器网络层失败，不是接口返回的错误</strong>，可能原因（按概率排序）：<br>① <strong>请求体超出代理上限</strong>（多张大图 / 高分辨率输出常见）${bodyHint}<br>② 正在使用的系统代理 / VPN / 翻墙软件阻断了对 <code class="text-rose-500">${host}</code> 的连接 → 加入直连（Direct）或临时关代理<br>③ 4K 等高分辨率 + 多并发可能撞代理 idle timeout（30s/60s）<br>④ 该域名当前对你所在网络不可达（换网络 / 热点试试）<br><br>排查：F12 → Network → 看请求 Status / 时长 / Request Payload 大小</div>`
      : '';
    botBubble.innerHTML = `<div class="text-rose-600 flex flex-col gap-1.5"><span class="font-bold text-xs uppercase tracking-wider">Error Encountered</span><span class="text-[13px] bg-rose-50 border border-rose-100 p-3 rounded-md break-all">${e.message}</span>${hint}</div>`;
    setStatus(genStatus, '请求失败', 'err');
    if (!rawEl.textContent || rawEl.textContent === '（尚未请求）') {
      rawEl.textContent = rawText || String(e);
    }
  }
  
  // Re-scroll to bottom after content loads
  chatEl.scrollTo({ top: chatEl.scrollHeight, behavior: 'smooth' });
});
</script>
</body>
</html>
